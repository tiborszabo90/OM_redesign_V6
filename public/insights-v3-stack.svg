<svg width="220" height="200" viewBox="0 0 220 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="110" cy="100" r="92" fill="#FFF7F2"/>
  <circle cx="110" cy="100" r="74" fill="#FFEFE5"/>

  <!-- Back card (most tilted, partial visible) -->
  <g transform="rotate(-10 110 100)" opacity="0.7">
    <rect x="56" y="56" width="108" height="84" rx="8" fill="white" stroke="#FBD9CE" stroke-width="1.5"/>
    <rect x="66" y="68" width="32" height="5" rx="2.5" fill="#E3E5E8"/>
    <path d="M68 110 L80 102 L92 106 L104 96 L116 100 L128 88 L140 92 L152 84" stroke="#FBD9CE" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Middle card -->
  <g transform="rotate(-2 110 100)">
    <rect x="52" y="50" width="116" height="92" rx="9" fill="white" stroke="#FBD9CE" stroke-width="2"/>
    <rect x="64" y="62" width="42" height="6" rx="3" fill="#E3E5E8"/>
    <rect x="64" y="74" width="28" height="4" rx="2" fill="#F1F2F4"/>
    <!-- bar group -->
    <rect x="66" y="106" width="10" height="20" rx="1.5" fill="#FBD9CE"/>
    <rect x="80" y="100" width="10" height="26" rx="1.5" fill="#FBD9CE"/>
    <rect x="94" y="94" width="10" height="32" rx="1.5" fill="#F7B59F"/>
    <rect x="108" y="86" width="10" height="40" rx="1.5" fill="#F7B59F"/>
    <rect x="122" y="80" width="10" height="46" rx="1.5" fill="#ED5A29"/>
    <rect x="136" y="92" width="10" height="34" rx="1.5" fill="#F7B59F"/>
  </g>

  <!-- Front card (cleanest, most prominent, with sparkline) -->
  <g transform="rotate(5 110 110)">
    <rect x="42" y="62" width="130" height="98" rx="10" fill="white" stroke="#ED5A29" stroke-width="2"/>
    <!-- Header -->
    <rect x="56" y="76" width="50" height="6" rx="3" fill="#3F4248"/>
    <rect x="56" y="88" width="34" height="4" rx="2" fill="#E3E5E8"/>
    <!-- Chart area -->
    <rect x="56" y="104" width="102" height="46" rx="4" fill="#FFEFE5"/>
    <!-- Smooth sparkline -->
    <path d="M62 138 Q 78 130, 92 124 T 124 110 T 152 100" stroke="#ED5A29" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Highlight peak dot -->
    <circle cx="152" cy="100" r="4" fill="#ED5A29"/>
    <circle cx="152" cy="100" r="7" fill="#ED5A29" opacity="0.2"/>
    <!-- Impact pill -->
    <rect x="132" y="74" width="34" height="14" rx="7" fill="#FFEFE5"/>
    <circle cx="140" cy="81" r="2" fill="#ED5A29"/>
    <rect x="146" y="79" width="16" height="4" rx="2" fill="#ED5A29"/>
  </g>

  <!-- Decorative sparkles -->
  <path d="M30 56 L32 62 L38 64 L32 66 L30 72 L28 66 L22 64 L28 62 Z" fill="#ED5A29" opacity="0.75"/>
  <path d="M188 132 L189.5 136 L193.5 137.5 L189.5 139 L188 143 L186.5 139 L182.5 137.5 L186.5 136 Z" fill="#F7B59F"/>
  <circle cx="195" cy="56" r="2.5" fill="#FBD9CE"/>
  <circle cx="28" cy="146" r="2.5" fill="#FBD9CE"/>
  <path d="M198 90 L199 93 L202 94 L199 95 L198 98 L197 95 L194 94 L197 93 Z" fill="#ED5A29" opacity="0.6"/>

  <!-- Shadow -->
  <ellipse cx="110" cy="176" rx="62" ry="4" fill="#FBD9CE" opacity="0.5"/>
</svg>

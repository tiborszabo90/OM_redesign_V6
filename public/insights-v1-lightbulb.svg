<svg width="220" height="200" viewBox="0 0 220 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="110" cy="100" r="90" fill="#FFF7F2"/>
  <circle cx="110" cy="100" r="72" fill="#FFEFE5"/>

  <!-- Light rays from bulb top -->
  <line x1="110" y1="20" x2="110" y2="30" stroke="#ED5A29" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="75" y1="36" x2="81" y2="44" stroke="#ED5A29" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="36" x2="139" y2="44" stroke="#ED5A29" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="68" x2="60" y2="72" stroke="#ED5A29" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="168" y1="68" x2="160" y2="72" stroke="#ED5A29" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bulb body (outer) -->
  <path d="M110 48 C 146 48, 162 80, 152 112 C 147 126, 132 132, 128 144 L 92 144 C 88 132, 73 126, 68 112 C 58 80, 74 48, 110 48 Z" fill="white" stroke="#ED5A29" stroke-width="2.5"/>


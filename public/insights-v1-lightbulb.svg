  <path d="M110 60 C 138 60, 150 84, 142 108 C 138 120, 128 124, 124 134 L 96 134 C 92 124, 82 120, 78 108 C 70 84, 82 60, 110 60 Z" fill="#FFEFE5"/>

  <!-- Mini chart inside the bulb -->
  <rect x="86" y="120" width="7" height="10" rx="1.5" fill="#FBD9CE"/>
  <rect x="97" y="113" width="7" height="17" rx="1.5" fill="#F7B59F"/>
  <rect x="108" y="106" width="7" height="24" rx="1.5" fill="#F7B59F"/>
  <rect x="119" y="98" width="7" height="32" rx="1.5" fill="#ED5A29"/>

  <!-- Trend line over bars -->
  <path d="M89 118 L100 112 L111 104 L122 96" stroke="#ED5A29" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="122" cy="96" r="2.5" fill="#ED5A29"/>

  <!-- Bulb base (screw threads) -->
  <path d="M93 144 L93 152 C 93 154, 95 156, 97 156 L 123 156 C 125 156, 127 154, 127 152 L 127 144" fill="#F7B59F"/>
  <line x1="93" y1="150" x2="127" y2="150" stroke="white" stroke-width="1"/>
  <rect x="96" y="158" width="28" height="5" rx="2" fill="#F7B59F"/>
  <rect x="99" y="165" width="22" height="4" rx="2" fill="#F7B59F"/>

  <!-- Decorative sparkles -->
  <path d="M36 96 L38 102 L44 104 L38 106 L36 112 L34 106 L28 104 L34 102 Z" fill="#ED5A29" opacity="0.7"/>
  <path d="M186 124 L187.5 128 L191.5 129.5 L187.5 131 L186 135 L184.5 131 L180.5 129.5 L184.5 128 Z" fill="#F7B59F"/>
  <circle cx="36" cy="138" r="2.5" fill="#FBD9CE"/>
  <circle cx="184" cy="60" r="2.5" fill="#FBD9CE"/>

  <!-- Shadow -->

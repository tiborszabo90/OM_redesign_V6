<!DOCTYPE html>

<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .controls { margin-bottom: 24px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .controls button { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; background: #ED5A29; color: white; }

  .label { font-size: 13px; color: #888; margin-bottom: 8px; }

  /* All animated SVG elements use CSS transitions */
  .page-el, .spp-el { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .spp-el { opacity: 0; }
  .spp-el.visible { opacity: 1; }

<script>

const phases = {

    price: { x: 83, y: 62, width: 42 },

    btn1: { opacity: 0 }, btn2: { opacity: 0 }, btn3: { opacity: 0 },
    spp: false,
  },
  '1a': {
    thumb1: { x: 12, y: 80, opacity: 1 }, thumb2: { x: 34, y: 80, opacity: 1 }, thumb3: { x: 56, y: 80, opacity: 1 },
    title: { x: 83, y: 12, width: 99 },

    price: { x: 83, y: 62, width: 42 },
    desc1: { y: 175, opacity: 1 }, desc2: { y: 184, opacity: 1 },
    desc3: { y: 175, opacity: 0 }, desc4: { y: 184, opacity: 0 },
    btn1: { opacity: 0 }, btn2: { opacity: 0 }, btn3: { opacity: 0 },
    spp: false,
  },
  // Phase 1 = 3a: SPP full-width at y=105
  1: {
    thumb1: { x: 12, y: 80, opacity: 1 }, thumb2: { x: 34, y: 80, opacity: 1 }, thumb3: { x: 56, y: 80, opacity: 1 },
    title: { x: 83, y: 12, width: 99 },
    text1: { x: 83, y: 31, width: 56 },
    text2: { x: 83, y: 40, width: 76 },
    price: { x: 83, y: 62, width: 42 },
    desc1: { y: 175, opacity: 1 }, desc2: { y: 184, opacity: 1 },
    desc3: { y: 175, opacity: 0 }, desc4: { y: 184, opacity: 0 },
    btn1: { opacity: 0 }, btn2: { opacity: 0 }, btn3: { opacity: 0 },
    spp: true,
    sppBg:     { x: 12, y: 105, width: 212, height: 62 },
    sppImg:    { x: 12, y: 105, width: 62, height: 62 },
    sppIcon:   { transform: 'translate(12, 105)' },
    sppTitle:  { x: 83,  y: 114, width: 86, height: 12 },
    sppCheck1: { x: 83,  y: 130, width: 8, height: 8 },
    sppLine1:  { x: 93,  y: 131, width: 94, height: 6 },
    sppCheck2: { x: 83,  y: 140, width: 8, height: 8 },
    sppLine2:  { x: 93,  y: 141, width: 104, height: 6 },
    sppCheck3: { x: 83,  y: 150, width: 8, height: 8 },
    sppLine3:  { x: 93,  y: 151, width: 86, height: 6 },
  },
  // Phase 2 = 3b: SPP smaller at y=64, right side — EXACT coords from 3b SVG
  2: {
    thumb1: { x: 12, y: 80, opacity: 1 }, thumb2: { x: 34, y: 80, opacity: 1 }, thumb3: { x: 56, y: 80, opacity: 1 },
    title: { x: 83, y: 12, width: 99 },
    text1: { x: 83, y: 28, width: 56 },
    text2: { x: 83, y: 37, width: 76 },
    price: { x: 83, y: 46, width: 42 },
    desc1: { y: 117, opacity: 1 }, desc2: { y: 126, opacity: 1 },
    desc3: { y: 136, opacity: 1 }, desc4: { y: 145, opacity: 1 },
    btn1: { opacity: 1 }, btn2: { opacity: 1 }, btn3: { opacity: 1 },
    spp: true,
    sppBg:     { x: 83,     y: 64,     width: 141,    height: 44 },
    sppImg:    { x: 83,     y: 64,     width: 43.53,  height: 43.53 },
    sppIcon:   { transform: 'translate(83, 64) scale(0.7)' },
    sppTitle:  { x: 132.85, y: 70.32,  width: 33.7,   height: 8.43 },
    sppCheck1: { x: 132.85, y: 81.55,  width: 5.62,   height: 5.62 },
    sppLine1:  { x: 140.57, y: 82.26,  width: 33.7,   height: 4.21 },
    sppCheck2: { x: 132.85, y: 88.57,  width: 5.62,   height: 5.62 },
    sppLine2:  { x: 140.57, y: 89.28,  width: 37.21,  height: 4.21 },
    sppCheck3: { x: 132.85, y: 95.6,   width: 5.62,   height: 5.62 },
    sppLine3:  { x: 140.57, y: 96.3,   width: 30.89,  height: 4.21 },
  },
  // Phase 3a: page shifts to 3c layout, SPP stays at 3b position
  '3a': {
    thumb1: { x: 12, y: 82, opacity: 1 }, thumb2: { x: 34, y: 82, opacity: 1 }, thumb3: { x: 56, y: 82, opacity: 1 },
    title: { x: 83, y: 12, width: 99 },
    text1: { x: 83, y: 31, width: 56 },
    text2: { x: 83, y: 40, width: 76 },
    price: { x: 83, y: 62, width: 42 },
    desc1: { y: 108, opacity: 1 }, desc2: { y: 117, opacity: 1 },
    desc3: { y: 136, opacity: 0 }, desc4: { y: 145, opacity: 0 },
    btn1: { opacity: 0 }, btn2: { opacity: 0 }, btn3: { opacity: 0 },
    spp: true,
    sppBg:     { x: 83,     y: 64,     width: 141,    height: 44 },
    sppImg:    { x: 83,     y: 64,     width: 43.53,  height: 43.53 },
    sppIcon:   { transform: 'translate(83, 64) scale(0.7)' },
    sppTitle:  { x: 132.85, y: 70.32,  width: 33.7,   height: 8.43 },
    sppCheck1: { x: 132.85, y: 81.55,  width: 5.62,   height: 5.62 },
    sppLine1:  { x: 140.57, y: 82.26,  width: 33.7,   height: 4.21 },
    sppCheck2: { x: 132.85, y: 88.57,  width: 5.62,   height: 5.62 },
    sppLine2:  { x: 140.57, y: 89.28,  width: 37.21,  height: 4.21 },

    sppLine3:  { x: 140.57, y: 96.3,   width: 30.89,  height: 4.21 },
  },
  // Phase 3 = 3c: SPP full-width at y=129
  3: {
    thumb1: { x: 12, y: 82, opacity: 1 }, thumb2: { x: 34, y: 82, opacity: 1 }, thumb3: { x: 56, y: 82, opacity: 1 },
    title: { x: 83, y: 12, width: 99 },
    text1: { x: 83, y: 31, width: 56 },
    text2: { x: 83, y: 40, width: 76 },
    price: { x: 83, y: 62, width: 42 },
    desc1: { y: 108, opacity: 1 }, desc2: { y: 117, opacity: 1 },
    desc3: { opacity: 0 }, desc4: { opacity: 0 },
    btn1: { opacity: 0 }, btn2: { opacity: 0 }, btn3: { opacity: 0 },
    spp: true,
    sppBg:     { x: 12, y: 129, width: 212, height: 62 },
    sppImg:    { x: 12, y: 129, width: 62, height: 62 },
    sppIcon:   { transform: 'translate(12, 129)' },
    sppTitle:  { x: 83,  y: 138, width: 86, height: 12 },
    sppCheck1: { x: 83,  y: 154, width: 8, height: 8 },
    sppLine1:  { x: 93,  y: 155, width: 94, height: 6 },
    sppCheck2: { x: 83,  y: 164, width: 8, height: 8 },
    sppLine2:  { x: 93,  y: 165, width: 104, height: 6 },
    sppCheck3: { x: 83,  y: 174, width: 8, height: 8 },
    sppLine3:  { x: 93,  y: 175, width: 86, height: 6 },
  }
};

const labels = { 0: '0 — Empty page', '1a': '1a — Lines move', 1: '1 — 3a (SPP bottom)', 2: '2 — 3b (SPP middle)', '3a': '3a — Layout shift', 3: '3 — 3c (SPP lower)' };

const sppIds = ['sppBg','sppImg','sppIcon','sppTitle','sppCheck1','sppLine1','sppCheck2','sppLine2','sppCheck3','sppLine3'];

function setPhase(p) {
  document.getElementById('phaseLabel').textContent = labels[p];
  const phase = phases[p];

  // Page elements
  for (const [id, attrs] of Object.entries(phase)) {
    if (id === 'spp') continue;
    if (sppIds.includes(id)) continue;
    const el = document.getElementById(id);
    if (!el) continue;
    for (const [attr, val] of Object.entries(attrs)) {
      if (attr === 'opacity') { el.style.opacity = val; }
      else { el.setAttribute(attr, val); }
    }
  }

  // SPP elements
  const showSpp = phase.spp;
  sppIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (showSpp) {
      el.classList.add('visible');
      const attrs = phase[id];
      if (attrs) {
        for (const [attr, val] of Object.entries(attrs)) {
          if (attr === 'transform') { el.setAttribute('transform', val); }
          else { el.setAttribute(attr, val); }
        }
      }
    } else {
      el.classList.remove('visible');
    }
  });
}

function autoPlay() {
  setPhase(0);
  setTimeout(() => setPhase('1a'), 1000);  // lines slide down + fade
  setTimeout(() => setPhase(1), 1800);     // SPP appears at bottom
  setTimeout(() => setPhase(2), 3200);     // SPP shrinks to middle
  setTimeout(() => setPhase(3), 5000);     // SPP expands to lower position
}

// Start at phase 0
setPhase(0);
</script>
